<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="color-scheme" content="light" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Scan</title>
    <style>
      :root {
        color-scheme: light;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html {
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        -webkit-text-size-adjust: 100%;
      }
      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        overflow: hidden;
        touch-action: manipulation;
        background: #ffffff;
        display: grid;
        place-items: center;
        padding: max(0.75rem, env(safe-area-inset-top))
          max(0.75rem, env(safe-area-inset-right))
          max(0.75rem, env(safe-area-inset-bottom))
          max(0.75rem, env(safe-area-inset-left));
      }
      #wrap {
        display: grid;
        place-items: center;
        width: 100%;
        height: min(100dvh, 100vh);
        max-height: 100dvh;
      }
      canvas#qr {
        display: block;
        max-width: 100%;
        max-height: min(92dvh, 92vh);
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .err {
        font: 500 0.9rem/1.4 system-ui, sans-serif;
        color: #5c5668;
        max-width: 20rem;
        text-align: center;
        padding: 1rem;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas
        id="qr"
        role="img"
        aria-label="QR code — scan with your phone camera"
      ></canvas>
      <p id="err" class="err" hidden></p>
    </div>
    <script src="/vendor/qrcode.min.js"></script>
    <script>
      (function () {
        var canvas = document.getElementById("qr");
        var errEl = document.getElementById("err");

        function showErr(msg) {
          canvas.hidden = true;
          errEl.hidden = false;
          errEl.textContent = msg;
        }

        function resolveCardUrl() {
          return fetch("/site-config.json", { cache: "no-store" })
            .then(function (r) {
              if (!r.ok) throw new Error("config");
              return r.json();
            })
            .then(function (cfg) {
              var raw = String((cfg && cfg.baseUrl) || "").trim();
              var placeholder = "your-card.vercel.app";
              if (raw && raw.indexOf(placeholder) === -1) {
                return raw.replace(/\/$/, "") + "/";
              }
              return window.location.origin + "/";
            })
            .catch(function () {
              return window.location.origin + "/";
            });
        }

        /** Always black modules on white — best for scanners; matches full-white screen */
        function qrColors() {
          return { dark: "#000000", light: "#ffffff" };
        }

        function viewportSize() {
          if (window.visualViewport) {
            return {
              w: window.visualViewport.width,
              h: window.visualViewport.height,
            };
          }
          return { w: window.innerWidth, h: window.innerHeight };
        }

        /** Largest square that fits the screen — big and centred for easy scanning on a phone */
        function qrCssPixelSize() {
          var v = viewportSize();
          var edge = 16;
          var usableW = v.w - edge * 2;
          var usableH = v.h - edge * 2;
          var side = Math.floor(Math.min(usableW, usableH) * 0.96);
          return Math.max(200, Math.min(side, 580));
        }

        function draw(url) {
          if (typeof QRCode === "undefined" || !QRCode.toCanvas) {
            showErr("QR library failed to load. Refresh the page.");
            return;
          }
          canvas.hidden = false;
          errEl.hidden = true;

          var colors = qrColors();
          var cssSize = qrCssPixelSize();
          var dpr = Math.min(window.devicePixelRatio || 1, 3);
          var genSize = Math.round(cssSize * dpr);

          QRCode.toCanvas(
            canvas,
            url,
            {
              width: genSize,
              margin: 3,
              errorCorrectionLevel: "M",
              color: { dark: colors.dark, light: colors.light },
            },
            function (e) {
              if (e) {
                showErr("Could not create QR code.");
                return;
              }
              canvas.style.width = cssSize + "px";
              canvas.style.height = cssSize + "px";
              canvas.setAttribute(
                "title",
                "Opens: " + url + " — scan with your camera."
              );
            }
          );
        }

        function run() {
          resolveCardUrl().then(function (url) {
            draw(url);
          });
        }

        run();

        var resizeTimer;
        window.addEventListener("resize", function () {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(run, 100);
        });

        window.addEventListener("orientationchange", function () {
          setTimeout(run, 250);
        });

        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", function () {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(run, 80);
          });
        }
      })();
    </script>
  </body>
</html>
