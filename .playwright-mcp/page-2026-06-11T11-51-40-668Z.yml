              - strong: Orbit keeps you accountable
              - generic: When you create an event, set your goal. Want to follow up with 10 people? Orbit tracks every one. It pings you when you are halfway there, flags who you have not reached out to yet, and nudges you when a day goes by without a follow-up. When someone replies, you get a ping so you never miss the moment. Orbit drafts a personalised message using your notes in your own tone. You set the goal. Orbit makes sure you hit it.
